#
# Builds, tests, and (optionally) releases the httpsql extension
# via the DuckDB extension-ci-tools reusable workflow.
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.0
    with:
      duckdb_version: v1.5.0
      ci_tools_version: v1.5.0
      extension_name: httpsql
      exclude_archs: 'wasm_mvp;wasm_eh;wasm_threads;windows_amd64_mingw'
      build_duckdb_shell: false
      skip_tests: true
