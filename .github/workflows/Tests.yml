name: Integration Tests
on: [push, pull_request, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  linux-test:
    name: Integration Tests (Linux)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      GEN: ninja
      CC: 'ccache gcc'
      CXX: 'ccache g++'
      CCACHE_DIR: ${{ github.workspace }}/ccache
      VCPKG_TARGET_TRIPLET: x64-linux-release
      VCPKG_HOST_TRIPLET: x64-linux-release
      VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

    steps:
    - name: Checkout extension
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: 'true'

    - name: Checkout httpsql-server
      uses: actions/checkout@v4
      with:
        repository: vimt/httpsql-server
        path: httpsql-server

    - name: Install system packages
      run: |
        sudo apt-get update -y -q -o=Dpkg::Use-Pty=0
        sudo apt-get install -y -q -o=Dpkg::Use-Pty=0 \
          build-essential \
          ccache \
          cmake \
          mysql-client \
          ninja-build \
          pkg-config

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: httpsql-server/go.mod
        cache-dependency-path: httpsql-server/go.sum

    - name: Cache Key
      id: cache_key
      working-directory: ./duckdb
      run: |
        DUCKDB_VERSION=$(git rev-parse --short HEAD)
        echo "value=${{ runner.os }}-${{ runner.arch }}-$DUCKDB_VERSION" >> "$GITHUB_OUTPUT"

    - name: Restore build cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/ccache
        key: ${{ steps.cache_key.outputs.value }}

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11.1
      with:
        vcpkgGitCommitId: ce613c41372b23b1f51333815feb3edd87ef8a8b

    - name: Load test data
      run: |
        mysql -h 127.0.0.1 -P 3306 -u root -proot < test/setup_test_data.sql

    - name: Build Go server
      working-directory: httpsql-server
      run: go build -o httpsql-server .

    - name: Build DuckDB extension
      run: make release

    - name: Run integration tests
      env:
        MYSQL_HOST: 127.0.0.1
        MYSQL_PORT: 3306
        MYSQL_USER: root
        MYSQL_PASS: root
        HTTPSQL_SERVER_BIN: ${{ github.workspace }}/httpsql-server/httpsql-server
      run: python3 test/run_tests.py

    - name: Save build cache
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/ccache
        key: ${{ steps.cache_key.outputs.value }}
